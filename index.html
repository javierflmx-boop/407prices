<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>407 Renovations · Price Book</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#F7F6F3}
body{background:#F7F6F3;font-family:'Inter',sans-serif;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:52px 20px 120px}

/* HEADER */
.hdr-tag{font-family:'Inter',sans-serif;font-weight:400;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:#B0A898;margin-bottom:16px}
.hdr-title{font-family:'Playfair Display',serif;font-weight:700;font-size:48px;color:#0F0E0C;line-height:1;margin-bottom:8px}
.hdr-title em{font-style:normal;color:#C8A96E}
.hdr-sub{font-family:'Inter',sans-serif;font-weight:300;font-size:13px;color:#9E9790;letter-spacing:.02em;margin-bottom:48px}
.divider{width:40px;height:1px;background:#C8A96E;margin-bottom:48px}

/* CARDS */
.card{background:#0F0E0C;border-radius:4px;margin-bottom:2px;overflow:hidden;transition:all .3s}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:22px 24px;cursor:pointer;user-select:none}
.card-left{display:flex;align-items:baseline;gap:16px}
.card-num{font-family:'Playfair Display',serif;font-weight:400;font-size:13px;color:#3A3733;min-width:20px}
.card-name{font-family:'Inter',sans-serif;font-weight:500;font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:#F7F6F3}
.card-right{display:flex;align-items:center;gap:12px}
.card-min{font-family:'Inter',sans-serif;font-weight:400;font-size:12px;color:#6A6460;letter-spacing:.05em}
.card-arrow{width:20px;height:20px;display:flex;align-items:center;justify-content:center;transition:transform .3s}
.card-arrow svg{width:12px;height:12px;stroke:#5C5650;fill:none;stroke-width:1.5}
.card.open .card-arrow{transform:rotate(180deg)}

/* BODY */
.card-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.card.open .card-body{max-height:2000px}
.card-body-inner{padding:0 24px 24px}
.body-line{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #1E1C1A;gap:12px}
.body-line:last-child{border-bottom:none}
.body-label{font-family:'Inter',sans-serif;font-weight:300;font-size:13px;color:#8A8480;flex:1;letter-spacing:.01em}
.body-price{font-family:'Inter',sans-serif;font-weight:500;font-size:13px;color:#F7F6F3;white-space:nowrap;margin-right:10px}
.add-btn{width:24px;height:24px;border-radius:50%;border:1px solid #2E2C2A;background:transparent;color:#5C5650;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;line-height:1;padding:0;font-family:sans-serif}
.add-btn.added{background:#C8A96E;border-color:#C8A96E;color:#0F0E0C;font-size:11px;font-weight:600}
.card-tagline{font-family:'Inter',sans-serif;font-weight:400;font-size:12px;color:#8A8480;letter-spacing:.03em;font-style:italic;padding:0 24px 16px;border-bottom:1px solid #1E1C1A;margin-bottom:4px}

/* KITCHEN HERO */
.hero{background:#0F0E0C;padding:0 24px 20px}
.hero-price-row{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid #1E1C1A;margin-bottom:16px}
.hero-amount{display:flex;align-items:flex-start;gap:4px}
.hero-currency{font-family:'Inter',sans-serif;font-weight:300;font-size:20px;color:#C8A96E;margin-top:8px}
.hero-number{font-family:'Playfair Display',serif;font-weight:700;font-size:64px;line-height:1;color:#F7F6F3;letter-spacing:-.02em}
.hero-pkg-btn{margin-top:10px;padding:8px 16px;border-radius:2px;border:1px solid #2E2C2A;background:transparent;color:#8A8480;font-family:'Inter',sans-serif;font-weight:500;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap}
.hero-pkg-btn.added{background:#C8A96E;border-color:#C8A96E;color:#0F0E0C}
.hero-caption{font-family:'Inter',sans-serif;font-weight:300;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#3A3733;margin-top:6px}

/* DISCOUNT */
.disc{background:#161412;border-radius:2px;padding:12px 14px;margin-bottom:16px}
.disc-lbl{font-family:'Inter',sans-serif;font-weight:500;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#5C5650;margin-bottom:8px}
.disc-btns{display:flex;gap:6px;flex-wrap:wrap}
.disc-btn{padding:5px 12px;border-radius:2px;border:1px solid #2E2C2A;background:transparent;font-family:'Inter',sans-serif;font-weight:500;font-size:10px;color:#5C5650;cursor:pointer;transition:all .15s;letter-spacing:.05em}
.disc-btn.active{background:#C8A96E;border-color:#C8A96E;color:#0F0E0C}
.disc-result{margin-top:8px;font-family:'Inter',sans-serif;font-size:11px;color:#C8A96E;font-weight:500}

/* INCLUDED / ADDONS */
.sect-lbl{font-family:'Inter',sans-serif;font-weight:500;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#3A3733;margin:16px 0 8px}
.incl-badge{font-family:'Inter',sans-serif;font-weight:500;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#C8A96E;background:#1E1C1A;padding:3px 8px;border-radius:2px}

/* SUMMARY */
.sum-bar{position:fixed;bottom:0;left:0;right:0;background:#0F0E0C;border-top:1px solid #1E1C1A;z-index:100;display:none}
.sum-inner{max-width:560px;margin:0 auto;padding:14px 20px 20px}
.sum-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #1E1C1A}
.sum-lbl{font-family:'Inter',sans-serif;font-weight:500;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#5C5650}
.sum-total{font-family:'Playfair Display',serif;font-weight:700;font-size:26px;color:#F7F6F3;letter-spacing:-.01em}
.sum-clear{padding:5px 12px;border-radius:2px;border:1px solid #2E2C2A;background:transparent;font-family:'Inter',sans-serif;font-weight:500;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#5C5650;cursor:pointer}
.sum-items{max-height:130px;overflow-y:auto}
.sum-line{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1A1814}
.sum-line:last-child{border-bottom:none}
.sum-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:8px}
.sum-name{font-family:'Inter',sans-serif;font-size:12px;color:#8A8480;flex:1;font-weight:300}
.sum-price{font-family:'Inter',sans-serif;font-weight:500;font-size:12px;color:#F7F6F3;margin-right:10px}
.sum-rm{background:none;border:none;cursor:pointer;color:#3A3733;font-size:14px;padding:0;line-height:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr-tag">407 Renovations · Orlando, FL</div>
  <div class="hdr-title">Price<br><em>Book.</em></div>
  <div class="divider"></div>
  <div class="hdr-sub">Tap any category to see rates · tap + to build your estimate</div>
  <div id="cards"></div>
</div>
<div class="sum-bar" id="sumBar">
  <div class="sum-inner">
    <div class="sum-head">
      <div>
        <div class="sum-lbl">Job Estimate</div>
        <div class="sum-total" id="sumTotal">$0</div>
      </div>
      <button class="sum-clear" onclick="clearAll()">Clear all</button>
    </div>
    <div class="sum-items" id="sumItems"></div>
  </div>
</div>
<script>
const CARDS=[
  {id:"design",color:"#8E6BBF",title:"Interior Design",tagline:"Consultation fee credited back if you book the job.",items:[
    {label:"On-site consultation (1–2 hrs)",price:200},
    {label:"Space planning & layout",price:350},
    {label:"Material & finish selection",price:250},
    {label:"Mood board & concept",price:200},
    {label:"Full design package",price:750},
    {label:"Project supervision (per visit)",price:150},
  ]},
  {id:"labor",color:"#C8A96E",title:"Labor Rates",tagline:"20 years · Orlando, FL · This is the price.",items:[
    {label:"Hourly rate",price:100},
    {label:"Half day (4 hrs)",price:400},
    {label:"Full day (8 hrs)",price:800},
    {label:"2-day job",price:1600},
    {label:"3-day job",price:2400},
    {label:"Week (5 days)",price:4000},
    {label:"Emergency / same-day",price:150,unit:"/ hr"},
  ]},
  {id:"bathroom",color:"#E07A30",title:"Bathroom",min:3500,items:[
    {label:"Standard bathroom — labor only",price:3500},
    {label:"Shower walls tile (60 sf)",price:600},
    {label:"Floor tile (50 sf)",price:250},
    {label:"Demo & prep",price:400},
    {label:"Drywall / cement board",price:400},
    {label:"Fixtures hookup",price:350},
    {label:"Grout & seal",price:200},
    {label:"Niche / corner shelf",price:150},
  ]},
  {id:"kitchen",color:"#C8A96E",title:"Kitchen",heroPrice:15000,
    included:["20 cabinets supply & install","LED lights inside cabinets","Countertop fabrication & set","Backsplash tile","Plumbing rough & finish","Electrical — outlets & hood","Demo & haul"],
    addons:[
      {label:"Extra cabinet (above 20)",price:350,unit:"/ each"},
      {label:"Cabinet with glass door",price:180,unit:"/ each"},
      {label:"Soft-close upgrade",price:95,unit:"/ each"},
      {label:"Under-cabinet LED strip",price:120,unit:"/ section"},
    ],items:[]},
  {id:"tile",color:"#2E9E5B",title:"Tile Labor",items:[
    {label:'24"×24" tile install',price:3.00,unit:"/ sf"},
    {label:'32"×32" tile install',price:3.50,unit:"/ sf"},
    {label:'24"×48" tile install',price:4.25,unit:"/ sf"},
    {label:"Backsplash install (full kitchen)",price:950},
    {label:"1,000 sf — 24×24",price:3000},
    {label:"1,000 sf — 32×32",price:3500},
    {label:"1,000 sf — 24×48",price:4250},
  ]},
  {id:"flooring",color:"#9B59B6",title:"Flooring",items:[
    {label:"LVP install",price:2.50,unit:"/ sf"},
    {label:"Hardwood install",price:4.50,unit:"/ sf"},
    {label:"Laminate install",price:2.00,unit:"/ sf"},
    {label:"Subfloor repair",price:600},
    {label:"Baseboards",price:3.50,unit:"/ lf"},
    {label:"Demo old flooring",price:350},
  ]},
  {id:"painting",color:"#2980B9",title:"Painting",items:[
    {label:"Interior room (avg)",price:350},
    {label:"Full house interior (2,000 sf)",price:4500},
    {label:"Exterior — 1 floor, 1,500 sf (labor + mat.)",price:2200},
    {label:"Kitchen cabinets repaint (full set)",price:3500},
    {label:"Trim & doors",price:600},
  ]},
  {id:"quick",color:"#16A085",title:"Quick Services",tagline:"Small jobs, real prices. No exceptions.",items:[
    {label:"Septic tank install — labor only (1 day)",price:1500},
    {label:"Septic tank install — labor only (2 days)",price:2500},
    {label:"Septic tank install — labor + unit + installation",price:3200},
    {label:"TV wall mount install",price:220},
    {label:"TV wall mount + power relocation",price:320},
    {label:"Ceiling fan install",price:180},
    {label:"Toilet install / replace",price:250},
    {label:"Faucet install / replace",price:150},
    {label:"Shower head / fixture replace",price:180},
    {label:"Vanity install",price:350},
    {label:"Mirror install",price:120},
    {label:"Towel bar & accessories set",price:100},
    {label:"Light fixture install",price:150},
    {label:"Door install (interior)",price:250},
    {label:"Door handle / lock replace",price:95},
  ]},
  {id:"drywall",color:"#C0392B",title:"Drywall",items:[
    {label:"Patch & texture (per hole)",price:120},
    {label:"Full room drywall",price:900},
    {label:"Popcorn removal + texture + paint",price:6.00,unit:"/ sf"},
  ]},
];

let summary=[],openCards={},discounts={};

function fmt(n,unit){
  if(unit) return "$"+Number(n).toFixed(2)+" "+unit;
  return "$"+Math.round(n).toLocaleString();
}
function isAdded(id){return summary.some(s=>s.id===id)}
function addItem(id,label,price,color){
  if(isAdded(id)) summary=summary.filter(s=>s.id!==id);
  else summary.push({id,label,price,color});
  render();
}
function clearAll(){summary=[];render();}
function toggleCard(id){openCards[id]=!openCards[id];render();}
function setDiscount(cardId,d){discounts[cardId]=d;render();}

function render(){
  document.getElementById("cards").innerHTML=CARDS.map((card,idx)=>{
    const isOpen=!!openCards[card.id];
    const disc=discounts[card.id]||0;
    const finalPrice=(card.heroPrice||0)-disc;
    let body="";

    if(card.heroPrice){
      const pk=card.id+"-pkg";
      const pa=isAdded(pk);
      body=`<div class="hero">
        <div class="hero-price-row">
          <div>
            <div class="hero-amount">
              <span class="hero-currency">$</span>
              <span class="hero-number">${finalPrice.toLocaleString()}</span>
            </div>
            <div class="hero-caption">Complete package · labor + materials</div>
            ${disc>0?`<div style="font-family:'Inter',sans-serif;font-size:11px;color:#3A3733;text-decoration:line-through;margin-top:4px">$${card.heroPrice.toLocaleString()}</div>`:""}
          </div>
          <button class="hero-pkg-btn ${pa?"added":""}" onclick="addItem('${pk}','Kitchen — complete package',${finalPrice},'${card.color}')">${pa?"✓ Added":"+ Add"}</button>
        </div>
        <div class="disc">
          <div class="disc-lbl">Discount</div>
          <div class="disc-btns">
            ${[0,250,500,750,1000].map(d=>`<button class="disc-btn ${disc===d?"active":""}" onclick="setDiscount('${card.id}',${d})">${d===0?"None":"-$"+d.toLocaleString()}</button>`).join("")}
          </div>
          ${disc>0?`<div class="disc-result">Final: $${finalPrice.toLocaleString()} · saving $${disc.toLocaleString()}</div>`:""}
        </div>
        <div class="sect-lbl">Included</div>
        ${card.included.map(item=>`<div class="body-line"><span class="body-label">${item}</span><span class="incl-badge">included</span></div>`).join("")}
        <div class="sect-lbl" style="margin-top:20px">Add-ons</div>
        ${card.addons.map((item,i)=>{
          const k=card.id+"-addon-"+i;const a=isAdded(k);
          return`<div class="body-line"><span class="body-label">${item.label}</span><span class="body-price">${fmt(item.price,item.unit)}</span><button class="add-btn ${a?"added":""}" onclick="addItem('${k}','${item.label}',${item.price},'${card.color}')">${a?"✓":"+"}</button></div>`;
        }).join("")}
      </div>`;
    } else {
      body=`<div class="card-body-inner">
        ${card.items.map((item,i)=>{
          const k=card.id+"-"+i;const a=isAdded(k);
          return`<div class="body-line"><span class="body-label">${item.label}</span><span class="body-price">${fmt(item.price,item.unit)}</span><button class="add-btn ${a?"added":""}" onclick="addItem('${k}','${item.label}',${item.price},'${card.color}')">${a?"✓":"+"}</button></div>`;
        }).join("")}
      </div>`;
    }

    return`<div class="card ${isOpen?"open":""}">
      <div class="card-head" onclick="toggleCard('${card.id}')">
        <div class="card-left">
          <span class="card-num">${String(idx+1).padStart(2,"0")}</span>
          <span class="card-name">${card.title}</span>
        </div>
        <div class="card-right">
          ${card.min?`<span class="card-min">from ${fmt(card.min)}</span>`:""}
          ${card.heroPrice?`<span class="card-min">from ${fmt(card.heroPrice)}</span>`:""}
          <span class="card-arrow"><svg viewBox="0 0 12 12"><polyline points="2,4 6,8 10,4"/></svg></span>
        </div>
      </div>
      ${card.tagline?`<div class="card-tagline">${card.tagline}</div>`:""}
      <div class="card-body">${body}</div>
    </div>`;
  }).join("");

  const bar=document.getElementById("sumBar");
  if(summary.length===0){bar.style.display="none";return;}
  bar.style.display="block";
  const total=summary.reduce((s,i)=>s+(i.price||0),0);
  document.getElementById("sumTotal").textContent="$"+Math.round(total).toLocaleString();
  document.getElementById("sumItems").innerHTML=summary.map(item=>`
    <div class="sum-line">
      <div style="display:flex;align-items:center;flex:1">
        <div class="sum-dot" style="background:${item.color}"></div>
        <span class="sum-name">${item.label}</span>
      </div>
      <span class="sum-price">${fmt(item.price)}</span>
      <button class="sum-rm" onclick="addItem('${item.id}','','0','')">×</button>
    </div>`).join("");
}
render();
</script>
</body>
</html>
