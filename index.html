<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>407 Renovations · Price Book</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#F2EFE9;font-family:'DM Sans',sans-serif;min-height:100vh}
.wrap{max-width:520px;margin:0 auto;padding:36px 16px 100px}
.eyebrow{font-family:'Montserrat',sans-serif;font-weight:200;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:#9E9790;margin-bottom:6px}
.title{font-family:'Montserrat',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.02em;color:#1A1714;line-height:1.1;margin-bottom:4px}
.title span{color:#F5A623}
.sub{font-size:12px;color:#9E9790;font-weight:300;margin-bottom:28px}
.card-wrap{position:relative;margin-bottom:14px}
.card-inner{background:#fff;border-radius:16px;border:1px solid #E8E2D9;padding:18px 18px 20px}
.card-cat{font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px}
.card-tagline{font-family:'Montserrat',sans-serif;font-weight:200;font-size:11px;letter-spacing:.08em;color:#9E9790;font-style:italic;margin-bottom:14px}
.line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0EBE3;gap:8px}
.line:last-child{border-bottom:none}
.line-label{font-size:13px;color:#5C5650;flex:1}
.line-price{font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;color:#1A1714;white-space:nowrap;margin-right:8px}
.add-btn{width:26px;height:26px;border-radius:50%;border:1px solid #DDD6CC;background:transparent;color:#9E9790;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1;padding:0}
.add-btn.added{background:#2E9E5B;border-color:#2E9E5B;color:#fff;font-size:13px}
.flap{position:absolute;inset:0;border-radius:16px;background:linear-gradient(150deg,#252220 0%,#1A1714 100%);cursor:pointer;overflow:hidden;transform-origin:top center;transition:transform .65s cubic-bezier(.4,0,.2,1)}
.flap.open{transform:rotateX(-165deg);pointer-events:none}
.flap-ghost{position:absolute;top:-18px;left:-6px;font-family:'Montserrat',sans-serif;font-weight:100;font-size:140px;line-height:1;color:rgba(255,255,255,.05);user-select:none;pointer-events:none}
.flap-name{position:absolute;top:16px;left:18px;display:flex;align-items:baseline;gap:4px}
.flap-first{font-family:'Montserrat',sans-serif;font-weight:400;font-size:40px;line-height:1;letter-spacing:-.03em}
.flap-rest{font-family:'Montserrat',sans-serif;font-weight:300;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.65);padding-bottom:3px}
.flap-hint{position:absolute;bottom:14px;right:16px;font-family:'Montserrat',sans-serif;font-weight:100;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.2);display:flex;align-items:center;gap:4px}
.close-btn{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.06);border:none;cursor:pointer;font-size:14px;color:#9E9790;display:flex;align-items:center;justify-content:center;z-index:10}
.hero-block{background:#1A1714;border-radius:14px;padding:20px 18px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.hero-ghost{position:absolute;top:-24px;right:-8px;font-family:'Montserrat',sans-serif;font-weight:100;font-size:140px;line-height:1;color:rgba(255,255,255,.04);user-select:none}
.hero-lbl{font-family:'Montserrat',sans-serif;font-weight:200;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:6px}
.hero-row{display:flex;align-items:flex-start;justify-content:space-between}
.hero-dollar{font-family:'Montserrat',sans-serif;font-weight:200;font-size:20px;color:#F5A623;margin-top:5px}
.hero-num{font-family:'Montserrat',sans-serif;font-weight:700;font-size:56px;line-height:1;letter-spacing:-.03em;color:#fff}
.hero-addbtn{margin-top:6px;padding:7px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);font-family:'Montserrat',sans-serif;font-weight:600;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hero-addbtn.added{background:#2E9E5B;border-color:#2E9E5B;color:#fff}
.hero-sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-top:8px}
.disc-wrap{background:#F9F5EF;border-radius:10px;padding:10px 12px;margin-bottom:14px;border:1px solid #EDE7DC}
.disc-lbl{font-family:'Montserrat',sans-serif;font-weight:600;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#9E9790;margin-bottom:8px}
.disc-btns{display:flex;gap:6px;flex-wrap:wrap}
.disc-btn{padding:5px 10px;border-radius:20px;border:1px solid #DDD6CC;background:transparent;font-family:'Montserrat',sans-serif;font-weight:600;font-size:10px;color:#9E9790;cursor:pointer;transition:all .15s}
.sect-lbl{font-family:'Montserrat',sans-serif;font-weight:600;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#B0A898;margin:10px 0 6px}
.incl-badge{font-family:'Montserrat',sans-serif;font-weight:600;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.sum-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E8E2D9;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:100;display:none}
.sum-inner{max-width:520px;margin:0 auto;padding:12px 16px 18px}
.sum-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #F0EBE3}
.sum-lbl{font-family:'Montserrat',sans-serif;font-weight:600;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#9E9790}
.sum-total{font-family:'Montserrat',sans-serif;font-weight:700;font-size:22px;color:#1A1714;letter-spacing:-.02em}
.sum-clear{padding:5px 12px;border-radius:20px;border:1px solid #E8E2D9;background:transparent;font-family:'Montserrat',sans-serif;font-weight:600;font-size:10px;color:#9E9790;cursor:pointer}
.sum-items{max-height:120px;overflow-y:auto}
.sum-line{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #F8F3EC}
.sum-line:last-child{border-bottom:none}
.sum-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:7px}
.sum-name{font-size:12px;color:#5C5650;flex:1}
.sum-price{font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;color:#1A1714;margin-right:8px}
.sum-rm{background:none;border:none;cursor:pointer;color:#C0B8B0;font-size:15px;padding:0;line-height:1}
@keyframes floatup{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:.9;transform:translateY(-3px)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">407 Renovations · Price Book</div>
  <div class="title">Know Your <span>Numbers</span></div>
  <div class="sub">Tap to open · tap + to build your job estimate</div>
  <div id="cards"></div>
</div>
<div class="sum-bar" id="sumBar">
  <div class="sum-inner">
    <div class="sum-head">
      <div>
        <div class="sum-lbl">Job Estimate</div>
        <div class="sum-total" id="sumTotal">$0</div>
      </div>
      <button class="sum-clear" onclick="clearAll()">Clear all</button>
    </div>
    <div class="sum-items" id="sumItems"></div>
  </div>
</div>
<script>
const CARDS=[
  {id:"design",color:"#8E6BBF",title:"Interior Design",tagline:"Consultation fee credited back if you book the job.",items:[
    {label:"On-site consultation (1–2 hrs)",price:200},
    {label:"Space planning & layout",price:350},
    {label:"Material & finish selection",price:250},
    {label:"Mood board & concept",price:200},
    {label:"Full design package",price:750},
    {label:"Project supervision (per visit)",price:150},
  ]},
  {id:"labor",color:"#F5A623",title:"Labor Rates",tagline:"20 years · Orlando, FL · This is the price.",items:[
    {label:"Hourly rate",price:100},
    {label:"Half day (4 hrs)",price:400},
    {label:"Full day (8 hrs)",price:800},
    {label:"2-day job",price:1600},
    {label:"3-day job",price:2400},
    {label:"Week (5 days)",price:4000},
    {label:"Emergency / same-day",price:150,unit:"/ hr"},
  ]},
  {id:"bathroom",color:"#E07A30",title:"Bathroom",min:3500,items:[
    {label:"Standard bathroom — labor only",price:3500},
    {label:"Shower walls tile (60 sf)",price:600},
    {label:"Floor tile (50 sf)",price:250},
    {label:"Demo & prep",price:400},
    {label:"Drywall / cement board",price:400},
    {label:"Fixtures hookup",price:350},
    {label:"Grout & seal",price:200},
    {label:"Niche / corner shelf",price:150},
  ]},
  {id:"kitchen",color:"#F5A623",title:"Kitchen",heroPrice:15000,
    included:["20 cabinets supply & install","LED lights inside cabinets","Countertop fabrication & set","Backsplash tile","Plumbing rough & finish","Electrical — outlets & hood","Demo & haul"],
    addons:[
      {label:"Extra cabinet (above 20)",price:350,unit:"/ each"},
      {label:"Cabinet with glass door",price:180,unit:"/ each"},
      {label:"Soft-close upgrade",price:95,unit:"/ each"},
      {label:"Under-cabinet LED strip",price:120,unit:"/ section"},
    ],items:[]},
  {id:"tile",color:"#2E9E5B",title:"Tile Labor",items:[
    {label:'24"×24" tile install',price:3.00,unit:"/ sf"},
    {label:'32"×32" tile install',price:3.50,unit:"/ sf"},
    {label:'24"×48" tile install',price:4.25,unit:"/ sf"},
    {label:"Backsplash install (full kitchen)",price:950},
    {label:"1,000 sf — 24×24",price:3000},
    {label:"1,000 sf — 32×32",price:3500},
    {label:"1,000 sf — 24×48",price:4250},
  ]},
  {id:"flooring",color:"#9B59B6",title:"Flooring",items:[
    {label:"LVP install",price:2.50,unit:"/ sf"},
    {label:"Hardwood install",price:4.50,unit:"/ sf"},
    {label:"Laminate install",price:2.00,unit:"/ sf"},
    {label:"Subfloor repair",price:600},
    {label:"Baseboards",price:3.50,unit:"/ lf"},
    {label:"Demo old flooring",price:350},
  ]},
  {id:"painting",color:"#2980B9",title:"Painting",items:[
    {label:"Interior room (avg)",price:350},
    {label:"Full house interior (2,000 sf)",price:4500},
    {label:"Exterior — 1 floor, 1,500 sf (labor + mat.)",price:2200},
    {label:"Kitchen cabinets repaint (full set)",price:3500},
    {label:"Trim & doors",price:600},
  ]},
  {id:"quick",color:"#16A085",title:"Quick Services",tagline:"Small jobs, real prices. No exceptions.",items:[
    {label:"Septic tank install — labor only (1 day)",price:1500},
    {label:"Septic tank install — labor only (2 days)",price:2500},
    {label:"Septic tank install — labor + unit + installation",price:3200},
    {label:"TV wall mount install",price:220},
    {label:"TV wall mount + power relocation",price:320},
    {label:"Ceiling fan install",price:180},
    {label:"Toilet install / replace",price:250},
    {label:"Faucet install / replace",price:150},
    {label:"Shower head / fixture replace",price:180},
    {label:"Vanity install",price:350},
    {label:"Mirror install",price:120},
    {label:"Towel bar & accessories set",price:100},
    {label:"Light fixture install",price:150},
    {label:"Door install (interior)",price:250},
    {label:"Door handle / lock replace",price:95},
  ]},
  {id:"drywall",color:"#C0392B",title:"Drywall",items:[
    {label:"Patch & texture (per hole)",price:120},
    {label:"Full room drywall",price:900},
    {label:"Popcorn removal + texture + paint",price:6.00,unit:"/ sf"},
  ]},
];

let summary=[];
let openCards={};
let discounts={};

function fmt(n,unit){
  if(unit) return "$"+Number(n).toFixed(2)+" "+unit;
  return "$"+Math.round(n).toLocaleString();
}
function isAdded(id){return summary.some(s=>s.id===id)}
function addItem(id,label,price,color){
  if(isAdded(id)){summary=summary.filter(s=>s.id!==id)}
  else{summary.push({id,label,price,color})}
  render();
}
function clearAll(){summary=[];render();}
function openCard(id){openCards[id]=true;render();}
function closeCard(id){openCards[id]=false;render();}
function setDiscount(cardId,d){discounts[cardId]=d;render();}

function render(){
  // cards
  document.getElementById("cards").innerHTML=CARDS.map(card=>{
    const isOpen=!!openCards[card.id];
    const first=card.title[0];
    const rest=card.title.slice(1).toUpperCase();
    const disc=discounts[card.id]||0;
    const finalPrice=(card.heroPrice||0)-disc;
    let content="";

    if(card.heroPrice){
      const pk=card.id+"-pkg";
      const pa=isAdded(pk);
      content=`
        <div class="hero-block">
          <div class="hero-ghost">K</div>
          <div class="hero-lbl">Standard Kitchen Renovation</div>
          <div class="hero-row">
            <div style="display:flex;align-items:flex-start;gap:2px">
              <span class="hero-dollar">$</span>
              <span class="hero-num">${finalPrice.toLocaleString()}</span>
            </div>
            <button class="hero-addbtn ${pa?"added":""}" onclick="addItem('${pk}','Kitchen — complete package',${finalPrice},'${card.color}')">${pa?"✓ Added":"+ Add to job"}</button>
          </div>
          <div class="hero-sub">Complete package · labor + materials</div>
        </div>
        <div class="disc-wrap">
          <div class="disc-lbl">Apply Discount</div>
          <div class="disc-btns">
            ${[0,250,500,750,1000].map(d=>`<button class="disc-btn" style="${disc===d?"background:"+card.color+";border-color:"+card.color+";color:#fff":""}" onclick="setDiscount('${card.id}',${d})">${d===0?"None":"-$"+d.toLocaleString()}</button>`).join("")}
          </div>
          ${disc>0?`<div style="margin-top:8px;font-family:'Montserrat',sans-serif;font-size:11px;color:${card.color};font-weight:600;">Final: $${finalPrice.toLocaleString()} · saving $${disc.toLocaleString()}</div>`:""}
        </div>
        <div class="sect-lbl">Everything included</div>
        ${card.included.map(item=>`<div class="line"><span class="line-label">${item}</span><span class="incl-badge" style="color:${card.color};background:${card.color}22;">included</span></div>`).join("")}
        <div class="sect-lbl" style="margin-top:12px">Add-ons</div>
        ${card.addons.map((item,i)=>{
          const k=card.id+"-addon-"+i;
          const a=isAdded(k);
          return`<div class="line"><span class="line-label">${item.label}</span><span class="line-price">${fmt(item.price,item.unit)}</span><button class="add-btn ${a?"added":""}" onclick="addItem('${k}','${item.label}',${item.price},'${card.color}')">${a?"✓":"+"}</button></div>`;
        }).join("")}`;
    } else {
      content=card.items.map((item,i)=>{
        const k=card.id+"-"+i;
        const a=isAdded(k);
        return`<div class="line"><span class="line-label">${item.label}</span><span class="line-price">${fmt(item.price,item.unit)}</span><button class="add-btn ${a?"added":""}" onclick="addItem('${k}','${item.label}',${item.price},'${card.color}')">${a?"✓":"+"}</button></div>`;
      }).join("");
    }

    return`<div class="card-wrap">
      <div class="card-inner">
        <div class="card-cat" style="color:${card.color}">${card.title}${card.min?` <span style="color:#9E9790;font-weight:400;font-size:9px;">· starts ${fmt(card.min)}+</span>`:""}</div>
        ${card.tagline?`<div class="card-tagline">${card.tagline}</div>`:""}
        ${content}
      </div>
      <div class="flap ${isOpen?"open":""}" onclick="openCard('${card.id}')">
        <div class="flap-ghost">${first}</div>
        <div class="flap-name">
          <span class="flap-first" style="color:${card.color}">${first}</span>
          <span class="flap-rest">${rest}</span>
        </div>
        <div class="flap-hint"><span style="animation:floatup 2.2s ease-in-out infinite">↑</span><span>open</span></div>
      </div>
      ${isOpen?`<button class="close-btn" onclick="event.stopPropagation();closeCard('${card.id}')">×</button>`:""}
    </div>`;
  }).join("");

  // summary
  const bar=document.getElementById("sumBar");
  if(summary.length===0){bar.style.display="none";return;}
  bar.style.display="block";
  const total=summary.reduce((s,i)=>s+(i.price||0),0);
  document.getElementById("sumTotal").textContent="$"+Math.round(total).toLocaleString();
  document.getElementById("sumItems").innerHTML=summary.map(item=>`
    <div class="sum-line">
      <div style="display:flex;align-items:center;flex:1">
        <div class="sum-dot" style="background:${item.color}"></div>
        <span class="sum-name">${item.label}</span>
      </div>
      <span class="sum-price">${fmt(item.price)}</span>
      <button class="sum-rm" onclick="addItem('${item.id}','','0','')">×</button>
    </div>`).join("");
}

render();
</script>
</body>
</html>
